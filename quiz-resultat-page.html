<!DOCTYPE html>
<html lang="en">
<head>
    <audio autoplay  hidden>
        <source src="./music/quiz-music-Celebration.mp3" type="audio/mpeg">
    </audio>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz page</title>
    <link rel="stylesheet" href="./quizresultat.css">
</head>
<body>
    <header class="header">
        <div class="category">
            <div class="icon-square">
                <img src="./assets/asset4.png" alt="accessibility icon">
            </div>
            Accessibility
        </div>
        <div class="theme-toggle">
            <span>☀️</span>
            <div class="toggle-track">
                <div class="toggle-ball"></div>
            </div>
            <span>🌙</span>
        </div>
    </header>

    <main class="main-content">
        <div class="text-section">
            <h1>Quiz completed <br> <span> You scored...</span></h1>
        </div>

        <div class="right-section">
            <div class="score-card">
                <div class="category">
                    <div class="icon-square">
                        <img src="./assets/asset4.png" alt="accessibility icon">
                    </div>
                    Accessibility
                </div>
                <p class="big-number">8</p>
                <p class="out-of">out of 10</p>
            </div>
            
            <button class="btn-play" onclick="playAgain()">Play Again</button>
        </div>
    </main>

    <script>
const params = new URLSearchParams(window.location.search);

const score = params.get("score");
const total = params.get("total");

// DISPLAY SCORE
document.querySelector(".big-number").textContent = score;
document.querySelector(".out-of").textContent = `out of ${total}`;

function playAgain() {
    window.location.href = "index.html";
}
</script>
</body>
</html>
