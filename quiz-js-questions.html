<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <header class="main-header">
    <div class="header-left">
        <div class="icon-square">
            <img src="./assets/asset3.png" alt="JavaScript icon">
        </div>
        <span class="category-name">JavaScript</span>
    </div>

    <div class="theme-toggle">
        <span>☀️</span>
        <div class="switch"><div class="ball"></div></div>
        <span>🌙</span>
    </div>
</header>
<main class="container">

    <!-- LEFT SIDE -->
    <div class="hero-text">
        <p>Question <span id="q-number">1</span> of 10</p>

        <h2 class="question"></h2>

        <div class="progress-container">
            <div class="progress"></div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="menu">

        <div class="item">
            <div class="option">A</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <div class="item">
            <div class="option">B</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <div class="item">
            <div class="option">C</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <div class="item">
            <div class="option">D</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <button class="submit-btn">Submit Answer</button>

        <div class="error-message">
          <span class="error-icon"></span>
          <span>Please select an answer</span>
        </div>

        

</main>
</body>
</html>
