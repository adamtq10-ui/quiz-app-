<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML quiz</title>
<link rel="stylesheet" href="quiz.css">
</head>

<body>

<div class="circle circle-top"></div>
<div class="circle circle-bottom"></div>

<header class="main-header">
    <div class="header-left">
        <div class="icon-square">
            <img src="./assets/asset1.png" alt="Html icon">
        </div>
        <span class="category-name">HTML</span>
    </div>

    <div class="theme-toggle">
        <span>☀️</span>
        <div class="switch"><div class="ball"></div></div>
        <span>🌙</span>
    </div>
</header>
<main class="container">

    <!-- LEFT SIDE -->
    <div class="hero-text">
        <p>Question <span id="q-number">1</span> of 10</p>

        <h2 class="question"></h2>

        <div class="progress-container">
            <div class="progress"></div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="menu">

        <div class="item">
            <div class="option">A</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <div class="item">
            <div class="option">B</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <div class="item">
            <div class="option">C</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <div class="item">
            <div class="option">D</div>
            <span></span>
            <div class="icon"></div>
        </div>

        <button class="submit-btn">Submit Answer</button>

        <div class="error-message">
          <span class="error-icon"></span>
          <span>Please select an answer</span>
        </div>

        

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

const allQuestions = {
    html: [
        {
        question: "What does HTML stand for?",
        answers: ["HyperTransfer Markup Language", "Hyper Text Markup Language", "Home Tool Markup Language", "HyperText Markup Link"],
        correct: 1
        },
        {
        question: "Which tag creates a link?",
        answers: ["<a>", "<link>", "<href>", "<url>"],
        correct: 0
        },
       {
        question: "Which tag is used for images?",
        answers: ["<img>", "<image>", "<pic>", "<src>"],
        correct: 0
       },
       {
        question: "What does the <head> tag contain?",
        answers: ["The main content of the page", "Metadata and links to resources", "Footer information", "Navigation links"],
        correct: 1
       },
       {
        question: "Which tag is used for a line break?",
        answers: ["<break>", "<lb>", "<br>", "<newline>"],
        correct: 2
        },
        {
        question: "What is the correct way to create a comment in HTML?",
        answers: ["<!-- This is a comment -->", "// This is a comment", "/* This is a comment */", "# This is a comment"],
        correct: 0
        },
        {
        question: "Which tag is used to create a table?",
        answers: ["<table>", "<tab>", "<tbl>", "<t>"],
        correct: 0
        },
        {
        question: "What does the <div> tag do?",
        answers: ["Defines a division or section", "Creates a hyperlink", "Inserts an image", "Defines a list"],
        correct: 0
        },
        {
        question: "Which attribute specifies an alternate text for an image?",
        answers: ["alt", "src", "title", "href"],
        correct: 0
        },
        {
        question: "What is the correct way to link an external CSS file?",
        answers: ["<link rel='stylesheet' href='styles.css'>", "<style src='styles.css'></style>", "<css link='styles.css'>", "<stylesheet href='styles.css'>"],
        correct: 0
        }
    ],
    css: [
        {
            question: "What does CSS stand for?",
            answers: ["Color and Style Sheets", "Coded Style Sheets", "Cascading Style Sheets", "Creative Style Sheets"],
            correct: 2
        },
        {
            question: "Which property is used to change the background color?",
            answers: ["color", "background-color", "bgcolor", "background"],
            correct: 1
        },
        { 
            question: "How do you select an element with id 'header' in CSS?",
            answers: ["#header", ".header", "header", "*header"],
            correct: 0
        },
        {
            question: "Which property is used to change the font size?",
            answers: ["font-size", "text-size", "size", "font"],
            correct: 0
        },
        {
            question: "How do you make a list that lists its items with squares?",
            answers: ["list-style-type: square;", "list-type: square;", "list: square;", "list-style: square;"],
            correct: 0
        },
        {
            question: "Which property is used to change the text color?",
            answers: ["text-color", "color", "font-color", "text-style"],
            correct: 1
        },
        {
            question: "How do you select all p elements inside a div element?",
            answers: ["div p", "div > p", "div + p", "div.p"],
            correct: 0
        },
        {
            question: "Which property is used to change the spacing between lines of text?",
            answers: ["line-spacing", "line-height", "text-spacing", "spacing"],
            correct: 1
        },
        {
            question: "How do you make a border with rounded corners?",
            answers: ["border-radius", "border-rounded", "border-corner-radius", "border-round"],
            correct: 0
        },
        {
            question: "Which property is used to change the width of an element?",
            answers: ["width", "element-width", "size", "length"],
            correct: 0
        }
    ],
    javascript: [
        {
            question: "Which keyword declares a variable?",
            answers: ["var", "const", "let", "All of the above"],
            correct: 3
        },
        {
            question: "Which method is used to log to the console?",
            answers: ["console.log()", "log.console()", "print()", "console.print()"],
            correct: 0
        },
        {
            question: "How do you create a function in JavaScript?",
            answers: ["function myFunction() {}", "def myFunction() {}", "create myFunction() {}", "function:myFunction() {}"],
            correct: 0
        },
        {
            question: "Which operator is used for strict equality?",
            answers: ["==", "!=", "===", "!=="],
            correct: 2
        },
        {
            question: "How do you write an if statement in JavaScript?",
            answers: ["if (condition) {}", "if condition then {}", "if condition {}", "if (condition) then {}"],
            correct: 0
        },
        {
            question: "Which method is used to add an element to the end of an array?",
            answers: ["push()", "pop()", "shift()", "unshift()"],
            correct: 0
        },
        {
            question: "How do you create a new object in JavaScript?",
            answers: ["var obj = {}", "var obj = new Object()", "var obj = Object.create()", "All of the above"],
            correct: 3
        },
        {
            question: "Which keyword is used to define a constant variable?",
            answers: ["const", "constant", "let", "var"],
            correct: 0
        },
        {
            question: "How do you write a comment in JavaScript?",
            answers: ["// This is a comment", "<!-- This is a comment -->", "# This is a comment", "/* This is a comment */"],
            correct: 0
        },
        {
            question: "Which method is used to parse a JSON string into an object?",
            answers: ["JSON.parse()", "JSON.stringify()", "JSON.toObject()", "JSON.fromString()"],
            correct: 0
        }
    ],
    accessibility: [
        {
            question: "Which of these color contrast ratios defines the minimum WCAG 2.1 Level AA requirement for normal text??",
            answers: ["4.5:1", "3:1", "2.5:1", "5:1"],
            correct: 0
        },
        {
            question: "Which of the following is NOT a common assistive technology used by people with disabilities?",
            answers: ["Screen readers", "Braille displays", "Voice recognition software", "Virtual reality headsets"],
            correct: 3
        },
        {
            question: "What does ARIA stand for in web accessibility?",
            answers: ["Accessible Rich Internet Applications", "Advanced Responsive Internet Accessibility", "Accessible Responsive Interface Attributes", "Advanced Rich Internet Applications"],
            correct: 0
        },
        {
            question: "Which of the following is an example of a semantic HTML element that can improve accessibility?",
            answers: ["<div>", "<span>", "<header>", "<section>"],
            correct: 2
        },
        {
            question: "What is the purpose of alt text for images in web accessibility?",
            answers: ["To provide a description of the image for screen readers", "To improve SEO", "To display a tooltip when hovering over the image", "To provide a caption for the image"],
            correct: 0
        },
        {
            question: "Which of the following is NOT a common accessibility issue for users with visual impairments?",
            answers: ["Lack of keyboard navigation", "Inadequate color contrast", "Missing alt text for images", "Slow page load times"],
            correct: 3
        },
        {
            question: "What is the purpose of a skip link in web accessibility?",
            answers: ["To allow users to skip to the main content of a page", "To skip loading certain resources on a page", "To skip to the next page in a multi-page form", "To skip to the top of the page"],
            correct: 0
        },
        {
            question: "Which of the following is an example of an assistive technology used by people with hearing impairments?",
            answers: ["Screen readers", "Braille displays", "Captioning software", "Voice recognition software"],
            correct: 2
        },
        {
            question: "What is the purpose of semantic HTML in web accessibility?",
            answers: ["To improve SEO", "To provide structure and meaning to web content for assistive technologies", "To make web pages look more visually appealing", "To reduce page load times"],
            correct: 1
        },
        {
            question: "Which of the following is NOT a common accessibility issue for users with motor impairments?",
            answers: ["Small clickable areas", "Lack of keyboard navigation", "Inadequate color contrast", "Complex forms"],
            correct: 2
         }
    ]
};

// GET SUBJECT FROM URL
const params = new URLSearchParams(window.location.search);
const subject = params.get("subject") || "html";

const questions = allQuestions[subject];

// ELEMENTS
const items = document.querySelectorAll(".item");
const questionText = document.querySelector(".question");
const submitBtn = document.querySelector(".submit-btn");
const progressBar = document.querySelector(".progress");
const qNumber = document.getElementById("q-number");
const errorMessage = document.querySelector(".error-message");

// STATE
let currentQuestion = 0;
let selectedIndex = null;

// LOAD QUESTION
function loadQuestion() {
    const q = questions[currentQuestion];

    questionText.textContent = q.question;

    qNumber.textContent = currentQuestion + 1;

    items.forEach((item, index) => {
        item.querySelector("span").textContent = q.answers[index];
    });
}

// SELECT ANSWER
items.forEach((item, index) => {
    item.addEventListener("click", () => {
        selectedIndex = index;

        items.forEach(i => i.classList.remove("selected"));
        item.classList.add("selected");
    });
});

// SUBMIT
submitBtn.addEventListener("click", () => {
    if (selectedIndex === null) {
        errorMessage.classList.add("show");

        setTimeout(() => {
            errorMessage.classList.remove("show");
        }, 2000);

        return;
    }

    errorMessage.classList.remove("show");

    const correctIndex = questions[currentQuestion].correct;

    items.forEach((item, index) => {
        if (index === correctIndex) {
            item.classList.add("correct");
        }

        if (index === selectedIndex && index !== correctIndex) {
            item.classList.add("wrong");
        }
    });

    const percent = ((currentQuestion + 1) / questions.length) * 100;
    progressBar.style.width = percent + "%";

    setTimeout(() => {
        currentQuestion++;
        selectedIndex = null;

        items.forEach(i =>
            i.classList.remove("selected", "correct", "wrong")
        );

        if (currentQuestion >= questions.length) {
            questionText.textContent = "Quiz Finished!";
            return;
        }

        loadQuestion();
    }, 1200);
});

// INIT
loadQuestion();
});
</script>


</body>
</html>
