<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>  
    <!-- first section of the quiz app -->

    <div class="circle circle-top"></div>
    <div class="circle circle-bottom"></div>

    <header class="main-header">
        <div class="subject-info">
          <div class="subject-icon" id="subject-icon"></div>
           <span id="subject-title"></span>
        </div>
        <div class="theme-toggle">
            <span>☀️</span>
            <div class="switch"><div class="ball"></div></div>
            <span>🌙</span>
        </div>
    </header>

    <main class="container">
        <div class="hero-text">
    <h1>Welcome to the <br><span class="bold-text">Frontend Quiz!</span></h1>
    <p class="subtitle">Pick a subject to get started.</p>
</div>

        <div class="menu">

            <a href="quiz.html?subject=html" class="item">
              <div class="box html">
               <img src="./assets/asset1.png" alt="HTML Icon">
              </div>
                <span>HTML</span>
            </a>

            <a href="quiz.html?subject=css" class="item">
                <div class="box css">
                    <img src="./assets/asset2.png" alt="CSS Icon">
                </div>
                <span>CSS</span>
            </a>

            <a href="quiz.html?subject=javascript" class="item">
                <div class="box js">
                    <img src="./assets/asset3.png" alt="Javascript Icon">
                </div>
                <span>Javascript</span>
            </a>

            <a href="quiz.html?subject=accessibility" class="item">
                <div class="box access">
                    <img src="./assets/asset4.png" alt="Accessibility Icon">
                </div>
                <span>Accessibility</span>
            </a>

        </div>
    </main>
</body>
</html>
